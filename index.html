<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#073b31">
  <meta name="description" content="Peru 2026 — prywatny przewodnik wyprawowy i aplikacja PWA.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peru 2026">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" href="./assets/logo.svg">
  <link rel="stylesheet" href="./styles.css">
  <title>Peru 2026 — Expedition Companion</title>
</head>
<body>
  <div id="appShell">
    <aside class="sidebar">
      <div class="brand">
        <img src="./assets/logo.svg" alt="">
        <div><strong>PERU 2026</strong><span>EXPEDITION COMPANION</span></div>
      </div>
      <nav id="sideNav"></nav>
      <div class="sidebar-footer">
        <button id="offlineButton" class="soft-button">⌁ <span data-i18n="offline">Tryb offline</span></button>
        <small>Kuba • Weronika • Daniel</small>
      </div>
    </aside>

    <div class="workspace">
      <header class="mobile-header">
        <button id="mobileMenu" class="icon-button">☰</button>
        <div class="mobile-brand"><img src="./assets/logo.svg" alt=""><strong>PERU 2026</strong></div>
        <button id="langTop" class="lang-button">EN</button>
      </header>

      <main id="mainContent" tabindex="-1"></main>

      <aside id="rightRail" class="right-rail"></aside>
    </div>

    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <div id="toast" class="toast" role="status"></div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
